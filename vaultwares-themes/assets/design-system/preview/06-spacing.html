<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VaultWares — Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--vault-paper);font-family:var(--vault-font-sans);color:var(--vault-text-primary)}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:8px}
  .row{display:grid;grid-template-columns:60px 60px 1fr;gap:14px;align-items:center}
  .num{font-family:var(--vault-font-mono);font-size:12px;color:var(--vault-muted)}
  .px{font-size:13px;color:var(--vault-slate)}
  .bar{height:14px;background:#CC9B21;border-radius:3px}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="num">space-1</span><span class="px">4 px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="num">space-2</span><span class="px">8 px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="num">space-3</span><span class="px">12 px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="num">space-4</span><span class="px">16 px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="num">space-6</span><span class="px">24 px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="num">space-8</span><span class="px">32 px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="num">space-10</span><span class="px">40 px</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="num">space-12</span><span class="px">48 px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="num">space-16</span><span class="px">64 px</span><div class="bar" style="width:64px"></div></div>
</div>
</body>
</html>
