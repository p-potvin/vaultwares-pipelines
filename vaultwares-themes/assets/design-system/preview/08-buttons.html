<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VaultWares — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--vault-paper);font-family:var(--vault-font-sans);color:var(--vault-text-primary)}
  .wrap{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  button{font-family:inherit;cursor:pointer;border-radius:8px;font-size:14px;font-weight:500;padding:10px 18px;transition:all 180ms cubic-bezier(.4,0,.2,1);display:inline-flex;align-items:center;gap:8px;border:1px solid transparent}
  .primary{background:#6B4DC9;color:#FDFCF7;border-color:#6B4DC9}
  .primary:hover{background:#5A40AD;border-color:#5A40AD}
  .secondary{background:transparent;color:#002B36;border-color:rgba(0,43,54,.18)}
  .secondary:hover{border-color:#6B4DC9;color:#5A40AD}
  .ghost{background:transparent;color:#002B36;border-color:transparent;padding:10px 12px}
  .ghost:hover{background:rgba(0,43,54,.05)}
  .danger{background:transparent;color:#A63D40;border-color:rgba(166,61,64,.3)}
  .danger:hover{background:var(--vault-danger-bg);border-color:#A63D40}
  .focus{box-shadow:var(--vault-shadow-focus);outline:none}
  .disabled{opacity:.45;pointer-events:none}
  svg{width:14px;height:14px}
  .label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--vault-muted);margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="label">Primary</div>
    <button class="primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Vault secured</button>
  </div>
  <div>
    <div class="label">Secondary</div>
    <button class="secondary">Continue</button>
  </div>
  <div>
    <div class="label">Ghost</div>
    <button class="ghost">Cancel</button>
  </div>
  <div>
    <div class="label">Destructive</div>
    <button class="danger">Erase device</button>
  </div>
  <div>
    <div class="label">Focus</div>
    <button class="primary focus">Continue</button>
  </div>
  <div>
    <div class="label">Disabled</div>
    <button class="primary disabled">Activate license</button>
  </div>
</div>
</body>
</html>
