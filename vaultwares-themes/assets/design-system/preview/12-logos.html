<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VaultWares — Logo lockups</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--vault-paper);font-family:var(--vault-font-sans)}
  .wrap{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .panel{border:1px solid var(--vault-border-subtle);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;min-height:130px;background:var(--vault-paper-bright)}
  .panel.dark{background:#002B36;border-color:rgba(253,246,227,.18)}
  .panel img{max-height:42px;width:auto;display:block}
  .panel .meta{font-family:var(--vault-font-mono);font-size:10px;color:var(--vault-muted)}
  .panel.dark .meta{color:#A8A294}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <img src="../assets/logos/vaultwares-wordmark-light.svg" alt="VaultWares wordmark" />
    <span class="meta">wordmark · light</span>
  </div>
  <div class="panel dark">
    <img src="../assets/logos/vaultwares-wordmark-dark.svg" alt="VaultWares wordmark dark" />
    <span class="meta">wordmark · dark</span>
  </div>
  <div class="panel">
    <img src="../assets/logos/vaultwares-minimal-ink-filled.png" alt="V mark ink" style="max-height:48px" />
    <span class="meta">V · ink filled</span>
  </div>
  <div class="panel dark">
    <img src="../assets/logos/vaultwares-minimal-gold-filled.png" alt="V mark gold" style="max-height:48px" />
    <span class="meta">V · gold filled</span>
  </div>
</div>
</body>
</html>
