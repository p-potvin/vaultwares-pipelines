<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VaultWares — Cards</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--vault-paper);font-family:var(--vault-font-sans);color:var(--vault-text-primary)}
  .wrap{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:#FDFCF7;border:1px solid var(--vault-border-subtle);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--vault-shadow-md)}
  .card.dark{background:#0E3A47;border-color:rgba(253,246,227,.18);color:var(--vault-paper)}
  .card.dark .desc{color:#D8D0B8}
  .icon{width:32px;height:32px;border-radius:8px;background:rgba(204,155,33,.14);display:flex;align-items:center;justify-content:center;color:#CC9B21}
  .title{font-size:16px;font-weight:500}
  .desc{font-size:13px;line-height:1.5;color:var(--vault-muted)}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:12px;color:var(--vault-muted)}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;background:var(--vault-success-bg);color:#1f6b0e;border-radius:999px;font-size:11px;font-weight:500}
  .dot{width:6px;height:6px;border-radius:999px;background:#4ECC21}
  svg{width:18px;height:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="9" width="20" height="6" rx="1"/><path d="M6 12h.01M10 12h.01"/></svg></div>
    <div class="title">VaultDrive Pro</div>
    <div class="desc">256 GB hardware-encrypted USB-C storage. FIPS 140-3 Level 3.</div>
    <div class="meta"><span class="pill"><span class="dot"></span>Secured</span><span>2 mounted</span></div>
  </div>
  <div class="card dark">
    <div class="icon" style="background:rgba(229,192,106,.14);color:#E5C06A"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <div class="title">VaultHSM Network</div>
    <div class="desc">PCIe and rack HSM. Manage cryptographic keys with hardware enforcement.</div>
    <div class="meta"><span class="pill" style="background:rgba(33,184,204,.14);color:#7ED4DE"><span class="dot" style="background:#21B8CC"></span>Online</span><span style="color:#A8A294">99.99% SLA</span></div>
  </div>
</div>
</body>
</html>
