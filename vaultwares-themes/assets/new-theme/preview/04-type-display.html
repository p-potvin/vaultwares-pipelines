<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VaultWares — Display & headings</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--vault-paper);font-family:var(--vault-font-sans);color:var(--vault-text-primary)}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:14px}
  .row{display:grid;grid-template-columns:80px 1fr;gap:18px;align-items:baseline}
  .meta{font-family:var(--vault-font-mono);font-size:11px;color:var(--vault-muted);padding-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="meta">56 / 64 · 300</span><span class="vault-display">Privacy first.</span></div>
  <div class="row"><span class="meta">40 / 48 · 300</span><span class="vault-h1">Security in service.</span></div>
  <div class="row"><span class="meta">32 / 40 · 400</span><span class="vault-h2">Initialize your VaultDrive</span></div>
  <div class="row"><span class="meta">24 / 32 · 500</span><span class="vault-h3">Set your master password</span></div>
  <div class="row"><span class="meta">18 / 26 · 500</span><span class="vault-h4">Up to 10 fingerprints can be enrolled</span></div>
</div>
</body>
</html>
