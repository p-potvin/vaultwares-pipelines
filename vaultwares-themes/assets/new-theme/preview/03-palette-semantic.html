<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VaultWares — Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--vault-paper);font-family:var(--vault-font-sans);color:var(--vault-text-primary)}
  .wrap{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:500}
  .dot{width:8px;height:8px;border-radius:999px}
  .banner{padding:14px 16px;border-radius:12px;border:1px solid;display:flex;flex-direction:column;gap:4px}
  .banner .t{font-size:13px;font-weight:500}
  .banner .d{font-size:12px;color:var(--vault-slate)}
  .focus-ring{padding:12px 16px;background:var(--vault-paper-bright);border:1px solid var(--vault-border-subtle);border-radius:12px;box-shadow:var(--vault-shadow-focus);font-size:13px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner" style="background:var(--vault-success-bg);border-color:#4ECC21;color:#1f6b0e">
    <span class="t">Vault secured.</span><span class="d">All volumes encrypted with AES-256-XTS.</span>
  </div>
  <div class="banner" style="background:var(--vault-warning-bg);border-color:#CC9B21;color:#7a5e0c">
    <span class="t">Attention required.</span><span class="d">Firmware update available for VaultDrive.</span>
  </div>
  <div class="banner" style="background:var(--vault-danger-bg);border-color:#A63D40;color:#6b1e21">
    <span class="t">We noticed something.</span><span class="d">Auto-lock policy not enforced on 2 devices.</span>
  </div>
  <div class="banner" style="background:var(--vault-info-bg);border-color:#21B8CC;color:#0d6473">
    <span class="t">Heads up.</span><span class="d">Offline activation requires the portal.</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 4px;grid-column:span 2">
    <span class="pill" style="background:var(--vault-success-bg);color:#1f6b0e"><span class="dot" style="background:#4ECC21"></span>Secured</span>
    <span class="pill" style="background:var(--vault-warning-bg);color:#7a5e0c"><span class="dot" style="background:#CC9B21"></span>Attention</span>
    <span class="pill" style="background:var(--vault-danger-bg);color:#6b1e21"><span class="dot" style="background:#A63D40"></span>Error</span>
    <span class="pill" style="background:var(--vault-info-bg);color:#0d6473"><span class="dot" style="background:#21B8CC"></span>Info</span>
    <span class="focus-ring">Focus ring · cyan · 3px / 35%</span>
  </div>
</div>
</body>
</html>
