name: Bootstrap vault-flows repository

# Manually trigger this workflow to create (or update) the vault-flows repository
# with all frontend files and its own CI/CD deploy workflow.
#
# Prerequisites:
#   - Create a repository secret named VAULT_FLOWS_PAT containing a GitHub
#     Personal Access Token (classic) with the `repo` scope for the account/org
#     that will own the vault-flows repository.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Deployed backend API URL (e.g. https://api.example.com)'
        required: false
        default: ''
      owner:
        description: 'GitHub owner (user or org) for the vault-flows repo (defaults to this repo owner)'
        required: false
        default: ''

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout vaultwares-pipelines
        uses: actions/checkout@v4

      - name: Determine target owner
        id: owner
        run: |
          OWNER="${{ github.event.inputs.owner }}"
          if [ -z "$OWNER" ]; then
            OWNER="${{ github.repository_owner }}"
          fi
          echo "value=$OWNER" >> "$GITHUB_OUTPUT"

      - name: Create vault-flows repository (if it does not exist)
        env:
          GH_TOKEN: ${{ secrets.VAULT_FLOWS_PAT }}
          OWNER: ${{ steps.owner.outputs.value }}
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$OWNER/vault-flows")
          if [ "$HTTP_CODE" = "404" ]; then
            echo "Creating vault-flows repository..."
            curl -s -f -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/user/repos" \
              -d '{"name":"vault-flows","description":"VaultFlows — React frontend for vaultwares-pipelines","private":false,"auto_init":false}'
          else
            echo "vault-flows repository already exists (HTTP $HTTP_CODE), continuing."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare vault-flows directory
        run: |
          mkdir -p /tmp/vault-flows/.github/workflows

          # Copy frontend contents, excluding node_modules and package-lock.json
          rsync -a \
            --exclude='node_modules' \
            --exclude='package-lock.json' \
            --exclude='playwright-report' \
            --exclude='.gitignore' \
            frontend/ /tmp/vault-flows/

          # Place the vault-flows CI/CD deploy workflow
          cp .github/vault-flows-deploy.yml /tmp/vault-flows/.github/workflows/deploy.yml

          # Write .gitignore
          cat > /tmp/vault-flows/.gitignore << 'GITIGNORE_EOF'
# Logs
logs
*.log
npm-debug.log*
yarn-debug.log*
yarn-error.log*
pnpm-debug.log*
lerna-debug.log*

node_modules
dist
dist-ssr
*.local

# Environment files
.env
.env.*
!.env.example

# Editor directories and files
.vscode/*
!.vscode/extensions.json
.idea
.DS_Store
*.suo
*.ntvs*
*.njsproj
*.sln
*.sw?
GITIGNORE_EOF

          # Write README
          REPO="${{ github.repository }}"
          OWNER_VAL="${{ steps.owner.outputs.value }}"
          cat > /tmp/vault-flows/README.md << README_EOF
# VaultFlows

VaultFlows is the React frontend for the [vaultwares-pipelines](https://github.com/${REPO}) backend API.

## Development

\`\`\`bash
npm install
cp .env.example .env   # configure VITE_API_URL if needed
npm run dev
\`\`\`

The dev server proxies \`/api/*\` requests to \`http://localhost:8000\` by default (configurable via \`VITE_API_URL\` in \`.env\`).

## Production Build

\`\`\`bash
VITE_API_URL=https://your-api-host npm run build
\`\`\`

## Deployment

Deployed to **GitHub Pages** via the CI workflow in \`.github/workflows/deploy.yml\`.

Set the \`VITE_API_URL\` repository variable in GitHub (**Settings → Variables → Actions**) to point to the deployed backend API URL, then re-run the workflow.

## E2E Tests

\`\`\`bash
npx playwright install --with-deps
npm run test:e2e
\`\`\`
README_EOF

      - name: Verify build
        working-directory: /tmp/vault-flows
        run: |
          npm install
          npm run build

      - name: Push content to vault-flows
        env:
          GH_TOKEN: ${{ secrets.VAULT_FLOWS_PAT }}
          OWNER: ${{ steps.owner.outputs.value }}
        run: |
          cd /tmp/vault-flows
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: initial VaultFlows frontend"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${OWNER}/vault-flows.git"
          git push -u origin main --force

      - name: Enable GitHub Pages for vault-flows
        env:
          GH_TOKEN: ${{ secrets.VAULT_FLOWS_PAT }}
          OWNER: ${{ steps.owner.outputs.value }}
        run: |
          # Enable Pages with GitHub Actions as the source (idempotent, ignore errors if already set)
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$OWNER/vault-flows/pages" \
            -d '{"build_type":"workflow"}' || true

      - name: Summary
        env:
          OWNER: ${{ steps.owner.outputs.value }}
          API_URL: ${{ github.event.inputs.api_url }}
        run: |
          echo "## vault-flows bootstrapped ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Repository:** https://github.com/${OWNER}/vault-flows" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Next steps" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Go to **https://github.com/${OWNER}/vault-flows/settings/variables/actions**" >> "$GITHUB_STEP_SUMMARY"
          echo "   and add a repository variable **\`VITE_API_URL\`** with your backend API URL." >> "$GITHUB_STEP_SUMMARY"
          echo "2. Go to **https://github.com/${OWNER}/vault-flows/settings/pages** and set" >> "$GITHUB_STEP_SUMMARY"
          echo "   Source → **GitHub Actions** if not already set." >> "$GITHUB_STEP_SUMMARY"
          echo "3. Re-run the \`Build and Deploy to GitHub Pages\` workflow in vault-flows." >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$API_URL" ]; then
            echo "4. Ensure the backend's **\`CORS_ORIGINS\`** env var includes the Pages URL." >> "$GITHUB_STEP_SUMMARY"
          fi
